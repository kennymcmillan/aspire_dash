# Aspire Academy — Brand Configuration
# Single source of truth for colours, fonts, and logo paths.
# Brand blue #004185 from aspire.qa, adapted for dark sidebar + light canvas.

name: Aspire Academy
tagline: Sports Analytics

# Primary colour palette
colors:
  # Aspire blue scale (derived from brand blue #004185)
  aspire-900: "#001d3d"    # Sidebar background (deep navy)
  aspire-800: "#002855"    # Sidebar hover
  aspire-700: "#003566"    # Sidebar active / borders
  aspire-600: "#004185"    # PRIMARY — brand blue (buttons, accents)
  aspire-500: "#0059b3"    # Lighter blue (links, highlights)
  aspire-400: "#3b82f6"    # Info / interactive
  aspire-300: "#60a5fa"    # Light blue accents
  aspire-200: "#93c5fd"    # Subtle blue tints
  aspire-100: "#dbeafe"    # Very light blue background
  aspire-50:  "#eff6ff"    # Near-white blue wash

  # Neutral scale (for text, backgrounds, borders)
  slate-50: "#f8fafc"
  slate-100: "#f1f5f9"
  slate-200: "#e2e8f0"
  slate-300: "#cbd5e1"
  slate-400: "#94a3b8"
  slate-500: "#64748b"
  slate-600: "#475569"
  slate-700: "#334155"
  slate-800: "#1e293b"
  slate-900: "#0f172a"

  # Secondary blue (links, hover states — from aspire.qa --bg-secondary)
  secondary: "#1876ab"

  # Accent (Aspire blue — primary buttons, CTA)
  accent: "#004185"
  accent-hover: "#003566"

  # Semantic
  success: "#16a34a"
  warning: "#d97706"
  danger: "#dc2626"
  info: "#3b82f6"

  # Gold (from aspire.qa --yellow: #fbb800 — active states, highlights, emphasis)
  gold: "#fbb800"
  gold-light: "#fef3c7"

  # Chart palette (10 colours, Aspire blue first)
  chart:
    - "#004185"  # aspire blue
    - "#16a34a"  # forest green
    - "#d97706"  # deep amber
    - "#dc2626"  # rich red
    - "#7c3aed"  # purple
    - "#0891b2"  # cyan
    - "#ea580c"  # orange
    - "#db2777"  # pink
    - "#0d9488"  # teal
    - "#4f46e5"  # indigo

# Typography
# Per https://www.aspire.qa sniff (2026-05-22): the official Aspire marketing
# site loads Poppins (weights 100-900 via Google Fonts) — we now match it so
# every aspire_dash app feels visually continuous with the public brand.
# Inter is kept as 'data' for tabular-heavy contexts (better tabular-nums).
fonts:
  heading: "'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  body: "'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  data: "'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  brand: "'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
  mono: "'SF Mono', 'Fira Code', 'Cascadia Code', Consolas, monospace"

# Sidebar (deep navy blue — not grey slate)
sidebar:
  width: 220
  bg: "#001d3d"
  border: "#003566"
  link-color: "#93c5fd"
  link-hover-bg: "#002855"
  link-active-bg: "#004185"

# Radius scale (px) — 8 px canonical (v0.23 polish pass)
# All three tiers collapse to 8 px per the brand audit. Was 6/8/12 — the
# 12 was the worst offender (every "card" looked too rounded vs the CSS
# layer's 8 px discipline). Use radius.full for pills/avatars only.
radius:
  sm: 8
  md: 8
  lg: 8
  full: 9999

# Shadow scale (slate-tinted for premium feel — v0.23 polish pass)
# Was rgba(0,0,0,...) pure-black. Slate tint (#0f172a-equiv) reads as
# considered, brand-aware depth — matches Linear/Stripe/Whoop. The CSS
# layer's --elev-1/2/3 tokens already use these values; Python now agrees.
shadows:
  sm: "0 1px 2px 0 rgba(15,23,42,0.04), 0 1px 3px 0 rgba(15,23,42,0.03)"
  md: "0 4px 12px -2px rgba(15,23,42,0.08), 0 2px 4px -2px rgba(15,23,42,0.04)"
  lg: "0 12px 32px -8px rgba(15,23,42,0.12), 0 8px 16px -6px rgba(15,23,42,0.06)"

# Page background — warmer than slate-100, lighter than white
# Use via theme.BG_PAGE in Python; --aspire-bg-page in CSS
bg_page: "#f7f9fc"

# ── v0.24 — design-system rhythm tokens ────────────────────────────────────
# What separates a polished system from "off-the-shelf Dash": every visual
# rhythm (spacing, motion, depth, type) lives in tokens so every component
# inherits the same beat. Without these, every component re-invents 8/12/16
# and the system drifts.

# Spacing scale (px) — the 4/8 grid. No 5/7/9/10/14 randoms.
spacing:
  xs:  4    # gap between icon + label, tiny insets
  sm:  8    # row-gap inside compact components
  md:  12   # default card-inner gap
  lg:  16   # default card padding, section gap
  xl:  20   # large card padding, page padding mobile
  xxl: 24   # page padding desktop, section-to-section
  xxxl: 32  # hero margin, ultrawide page padding

# Motion — every transition uses these eases. Match Linear/Stripe feel.
motion:
  ease_out:     "cubic-bezier(0.16, 1, 0.3, 1)"     # snappy entry (Stripe pattern)
  ease_in_out:  "cubic-bezier(0.4, 0, 0.2, 1)"      # default material-ish
  ease_spring:  "cubic-bezier(0.34, 1.56, 0.64, 1)" # subtle overshoot for buttons
  duration_fast:   "150ms"   # hover state changes
  duration_normal: "200ms"   # default
  duration_slow:   "400ms"   # collapse/expand panels

# Z-index scale — explicit layers, no magic numbers
z_index:
  dropdown:    1000
  sticky:      1020
  fixed:       1030
  modal_bg:    1040
  modal:       1050
  popover:     1060
  tooltip:     1070
  toast:       1080

# Border widths — opinionated 1/2/4 only (skip 3, ambiguous at small sizes)
borders:
  thin:   "1px"   # default hairlines (slate-100/200)
  medium: "2px"   # active tab underline, focus ring outer
  thick:  "4px"   # left-accent bars on KPI tiles, financial scope

# Letter-spacing scale — uppercase eyebrow labels need 0.4-0.5 px
tracking:
  tight:   "-0.02em"   # large display headings
  normal:  "0"
  wide:    "0.04em"    # subhead emphasis
  wider:   "0.5px"     # uppercase eyebrows, status pills
  widest:  "1.4px"     # section titles (CSS .section-title-v2)

# Density tiers (multiplies spacing — apps can opt in to compact)
density:
  compact:     0.75    # data tables, dense list views
  comfortable: 1.0     # default
  spacious:   1.25     # marketing/landing pages, financial reports

# Gold accent — full scale so "achievement / target met" gets variants
# beyond the original 2 shades
gold-scale:
  900: "#92400e"   # text on gold bg
  700: "#a16207"
  600: "#ca8a04"
  500: "#eab308"
  400: "#fbb800"   # PRIMARY gold (from aspire.qa --yellow)
  300: "#fcd34d"
  200: "#fde68a"
  100: "#fef3c7"   # gold-light surface
  50:  "#fffbeb"   # gold-wash bg

# Logo
logo:
  filename: "aspire-logo.png"
  alt: "Aspire Academy"
  svg_url: "https://www.aspire.qa/images/aspire-academy-logo.svg"
